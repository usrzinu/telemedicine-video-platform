<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal - AuraMed</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Main Styles -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Admin specific overrides */
        :root {
            --primary: #ef4444; /* Red accent for admin */
            --primary-hover: #b91c1c;
            --secondary: #f97316;
            --shadow-glow: 0 0 20px rgba(239, 68, 68, 0.3);
        }
        [data-theme="dark"] {
            --primary: #f87171;
            --primary-hover: #ef4444;
            --secondary: #fb923c;
            --shadow-glow: 0 0 30px rgba(248, 113, 113, 0.2);
        }
        .blob-1 { background: var(--primary); }
        .blob-2 { background: var(--secondary); }
    </style>
</head>
<body>
    <!-- Animated Background Blobs -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="auth-container">
        <div class="auth-card glass-card glass" style="border-top: 4px solid var(--primary);">
            <div style="font-size: 3rem; color: var(--primary); margin-bottom: 1rem;">
                <i class="fa-solid fa-user-shield"></i>
            </div>
            
            <h2 style="margin-bottom: 0.5rem;">System Administration</h2>
            <p style="margin-bottom: 2rem;">Authorized Personnel Only</p>
            
            <form class="auth-form" id="adminLoginForm">
                <div class="form-group">
                    <label for="email">Admin Email / ID</label>
                    <input type="text" id="email" name="email" placeholder="admin@auramed.sys" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Security Key</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">
                    <i class="fa-solid fa-lock" style="margin-right: 0.5rem;"></i> Establish Secure Connection
                </button>
            </form>
            
            <div class="auth-footer" style="margin-top: 2rem; display: flex; justify-content: space-between; align-items: center;">
                <a href="index.html" style="color: var(--text-muted);"><i class="fa-solid fa-arrow-left"></i> Back to Main Portal</a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/main.js"></script>
    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            alert("Admin Authentication mock: Accessing secure admin dashboard...");
        });
    </script>
</body>
</html>
