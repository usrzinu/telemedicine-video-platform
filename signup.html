<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - AuraMed</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Main Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Animated Background Blobs -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <!-- Navigation Bar -->
    <nav id="navbar" class="scrolled">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-heart-pulse"></i>
                <span class="text-gradient">AuraMed</span>
            </a>
            
            <div class="nav-links">
                <a href="index.html#about">About AI</a>
                <a href="index.html#features">Features</a>
                <a href="index.html#tips">Preparation Tips</a>
            </div>
            
            <div class="nav-links">
                <button id="theme-toggle" class="btn btn-outline" style="border: none; padding: 0.5rem;"><i class="fa-solid fa-moon"></i></button>
                <a href="login.html" class="btn btn-outline">Sign In</a>
                <a href="signup.html" class="btn btn-primary" style="box-shadow: none;">Sign Up</a>
            </div>
        </div>
    </nav>

    <div class="auth-container" style="padding-top: 6rem;">
        <div class="auth-card glass-card glass" style="max-width: 550px;">
            <h2 style="margin-bottom: 2rem;">Create Your Account</h2>
            
            <form class="auth-form" id="signupForm">
                
                <div class="form-group">
                    <label>I am registering as a</label>
                    <select name="role" id="roleSelect">
                        <option value="patient">Patient (Seek Medical Advice)</option>
                        <option value="doctor">Doctor (Provide Consultations)</option>
                        <option value="admin">Admin (System Monitor)</option>
                    </select>
                </div>

                <div style="display: flex; gap: 1rem;">
                    <div class="form-group" style="flex: 1;">
                        <label for="firstName">First Name</label>
                        <input type="text" id="firstName" name="firstName" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label for="lastName">Last Name</label>
                        <input type="text" id="lastName" name="lastName" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Create Password</label>
                    <input type="password" id="password" name="password" placeholder="At least 8 characters" required>
                </div>
                
                <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">Create Account</button>
                <div style="text-align: center; font-size: 0.8rem; color: var(--text-muted); margin-top: 0.5rem;">
                    By creating an account, you agree to our <a href="#" style="color: var(--primary);">Terms of Service</a> and <a href="#" style="color: var(--primary);">Privacy Policy</a>.
                </div>
            </form>
            
            <div class="auth-footer" style="margin-top: 2rem;">
                Already have an account? <a href="login.html">Sign In</a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/main.js"></script>
</body>
</html>
