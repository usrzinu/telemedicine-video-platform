<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Health Dashboard - AuraMed</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <nav id="navbar" class="scrolled">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-heart-pulse"></i>
                <span class="text-gradient">AuraMed</span>
            </a>
            <div class="nav-links">
                <span id="welcomeMsg" style="font-weight: 600;">Welcome</span>
                <button id="logoutBtn" class="btn btn-outline" style="padding: 0.5rem 1rem;">Sign Out</button>
            </div>
        </div>
    </nav>

    <div class="auth-container" style="padding-top: 8rem;">
        <div class="glass-card glass" style="max-width: 800px; padding: 3rem; text-align: center;">
            <i class="fa-solid fa-hospital-user" style="font-size: 3rem; color: var(--primary); margin-bottom: 2rem;"></i>
            <h1 class="text-gradient">My Patient Dashboard</h1>
            <p style="margin-top: 1rem; color: var(--text-muted);">Access your medical history, prescriptions, and consult with specialists securely.</p>
            
            <div style="margin-top: 3rem; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem;">
                <div class="glass-card" style="padding: 1.5rem; border-top: 4px solid var(--primary);">
                    <i class="fa-solid fa-calendar-check" style="margin-bottom: 1rem; color: var(--primary);"></i>
                    <p>Book Appointment</p>
                </div>
                <div class="glass-card" style="padding: 1.5rem; border-top: 4px solid var(--secondary);">
                    <i class="fa-solid fa-message-medical" style="margin-bottom: 1rem; color: var(--secondary);"></i>
                    <p>Contact Support</p>
                </div>
                <div class="glass-card" style="padding: 1.5rem; border-top: 4px solid #10b981;">
                    <i class="fa-solid fa-vial" style="margin-bottom: 1rem; color: #10b981;"></i>
                    <p>Lab Results</p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const userName = localStorage.getItem('userName');
            const userRole = localStorage.getItem('userRole');
            if (!userRole || userRole !== 'patient') {
                window.location.href = 'login.html';
            }
            document.getElementById('welcomeMsg').innerText = `Welcome, ${userName}`;
        });
    </script>
</body>
</html>
