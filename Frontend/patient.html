<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Health Dashboard - AuraMed</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
    <!-- Top Navbar -->
    <nav class="top-navbar">
        <div class="top-navbar-left">
            <div class="sidebar-logo" style="margin-bottom: 0;">
                <i class="fa-solid fa-heart-pulse" style="color: var(--primary);"></i>
                <span class="text-gradient">AuraMed</span>
            </div>
            <div class="top-nav-btn active" id="overviewBtn">
                <i class="fa-solid fa-house-user"></i>
                <span>My Dashboard</span>
            </div>
        </div>
        <div class="top-navbar-right">
            <div id="welcomeMsg" style="font-weight: 600; font-size: 0.9rem; color: var(--text-muted);">Welcome</div>
            <div id="logoutBtn" class="top-nav-btn sign-out">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span>Sign Out</span>
            </div>
        </div>
    </nav>

    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <nav class="sidebar-nav">
                <div class="nav-item active">
                    <i class="fa-solid fa-user-doctor"></i>
                    <span>Find Doctors</span>
                </div>
                <div class="nav-item">
                    <i class="fa-solid fa-calendar-check"></i>
                    <span>Appointments</span>
                </div>
                <div class="nav-item">
                    <i class="fa-solid fa-folder-medical"></i>
                    <span>Medical History</span>
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="dash-header">
                <div>
                    <h1 class="text-gradient" style="margin-bottom: 0.5rem;" id="welcomeMsg">Welcome</h1>
                    <p style="margin-bottom: 0; color: var(--text-muted);">Manage your personal health journey with AuraMed.</p>
                </div>
                <div class="glass" style="padding: 0.5rem 1rem; border-radius: 999px; font-size: 0.9rem; font-weight: 600;">
                    <i class="fa-solid fa-user" style="color: var(--primary); margin-right: 0.5rem;"></i>
                    Patient Portal
                </div>
            </header>

            <div class="stat-grid">
                <div class="stat-card">
                    <div class="stat-icon"><i class="fa-solid fa-calendar-plus"></i></div>
                    <div class="stat-info">
                        <h3>Book</h3>
                        <p>New Appointment</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background: rgba(139, 92, 246, 0.1); color: var(--secondary);"><i class="fa-solid fa-comment-medical"></i></div>
                    <div class="stat-info">
                        <h3>Contact</h3>
                        <p>Support Team</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background: rgba(16, 185, 129, 0.1); color: #10b981;"><i class="fa-solid fa-vial-circle-check"></i></div>
                    <div class="stat-info">
                        <h3>Lab</h3>
                        <p>Recent Results</p>
                    </div>
                </div>
            </div>

            <div class="data-card">
                <h2 style="margin-bottom: 1.5rem;"><i class="fa-solid fa-user-md" style="color: var(--primary); margin-right: 0.5rem;"></i> Specialist Directory</h2>
                <div id="doctorList" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem;">
                    <!-- Doctors will be loaded here -->
                    <p class="text-muted">Loading providers...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- User Verification Scripts -->
    <script>
        const userRole = localStorage.getItem('userRole');
        if (!userRole || userRole !== 'patient') {
            window.location.href = 'login.html';
        }
    </script>
    <script src="js/main.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
