<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Portal - AuraMed</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
    <!-- Top Navbar -->
    <nav class="top-navbar">
        <div class="top-navbar-left">
            <div class="sidebar-logo" style="margin-bottom: 0;">
                <i class="fa-solid fa-heart-pulse" style="color: var(--primary);"></i>
                <span class="text-gradient">AuraMed</span>
            </div>
            <div class="top-nav-btn active" id="overviewBtn">
                <i class="fa-solid fa-calendar-check"></i>
                <span>My Consultations</span>
            </div>
        </div>
        <div class="top-navbar-right">
            <div id="welcomeMsg" style="font-weight: 600; font-size: 0.9rem; color: var(--text-muted);">Welcome, Doctor</div>
            <div id="logoutBtn" class="top-nav-btn sign-out">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span>Sign Out</span>
            </div>
        </div>
    </nav>

    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <nav class="sidebar-nav">
                <div class="nav-item active">
                    <i class="fa-solid fa-calendar-days"></i>
                    <span>Schedule</span>
                </div>
                <div class="nav-item">
                    <i class="fa-solid fa-hospital-user"></i>
                    <span>My Patients</span>
                </div>
                <div class="nav-item">
                    <i class="fa-solid fa-file-invoice-dollar"></i>
                    <span>E-Prescriptions</span>
                </div>
                <div class="nav-item">
                    <i class="fa-solid fa-user-gear"></i>
                    <span>Profile Settings</span>
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="dash-header">
                <div>
                    <h1 class="text-gradient" id="welcomeMsg" style="margin-bottom: 0.5rem;">Doctor Portal</h1>
                    <p style="margin-bottom: 0; color: var(--text-muted);">Manage your clinical activities securely.</p>
                </div>
                <div class="glass" style="padding: 0.5rem 1rem; border-radius: 999px; font-size: 0.9rem; font-weight: 600;">
                    <i class="fa-solid fa-stethoscope" style="color: var(--primary); margin-right: 0.5rem;"></i>
                    Medical Provider
                </div>
            </header>


        </main>
    </div>

    <!-- User Verification Scripts -->
    <script>
        const userRole = localStorage.getItem('userRole');
        if (!userRole || userRole !== 'doctor') {
            window.location.href = 'login.html';
        }
    </script>
    <script src="js/main.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
