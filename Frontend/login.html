<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - AuraMed</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Main Styles -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/notifications.css">
</head>
<body>
    <!-- Animated Background Blobs -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <!-- Navigation Bar -->
    <nav id="navbar" class="scrolled">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-heart-pulse"></i>
                <span class="text-gradient">AuraMed</span>
            </a>
            
            <div class="nav-links">
                <a href="index.html#about">About Service</a>
                <a href="index.html#features">Features</a>
                <a href="index.html#tips">Preparation Tips</a>
            </div>
            
            <div class="nav-links">
                <button id="theme-toggle" class="btn btn-outline" style="border: none; padding: 0.5rem;"><i class="fa-solid fa-moon"></i></button>
                <a href="login.html" class="btn btn-outline" style="background: var(--surface);">Sign In</a>
                <a href="signup.html" class="btn btn-primary">Sign Up</a>
            </div>
        </div>
    </nav>

    <div class="auth-container" style="padding-top: 6rem;">
        <div class="auth-card glass-card glass">
            <h2 style="margin-bottom: 2rem;">Welcome Back</h2>
            
            <form class="auth-form" id="loginForm">
                <div class="form-group">
                    <label>Login as</label>
                    <select name="role" id="roleSelect">
                        <option value="patient">Patient</option>
                        <option value="doctor">Doctor</option>
                        <option value="admin">System Admin</option>
                    </select>
                </div>

                <div id="doctorApprovalNotice" style="display: none; background: rgba(245, 158, 11, 0.1); border-left: 4px solid var(--secondary); padding: 0.8rem; margin-bottom: 1.5rem; border-radius: 4px; font-size: 0.85rem; color: var(--text-color);">
                    <i class="fa-solid fa-circle-info" style="color: var(--secondary); margin-right: 0.5rem;"></i>
                    <strong>Note:</strong> Doctor accounts require Admin approval before you can successfully sign in.
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="email@gmail.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
                
                <div class="form-options">
                    <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                        <input type="checkbox" style="width: auto;"> Remember me
                    </label>
                    <a href="#">Forgot password?</a>
                </div>
                
                <button type="submit" class="btn btn-primary">Sign In</button>
            </form>
            
            <div class="auth-footer">
                Don't have an account? <a href="signup.html">Create one here</a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
